name: H4 Trading Bot

on:
  schedule:
    - cron: '5 0,4,8,12,16,20 * * *' # Chạy lúc 7h05, 11h05... VN
  workflow_dispatch: # Cho phép bấm chạy tay

jobs:
  run-bot:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout code
      uses: actions/checkout@v3

    - name: Set up Python
      uses: actions/setup-python@v4
      with:
        python-version: '3.10'

    - name: Install dependencies (Thủ công để tránh lỗi)
      run: |
        python -m pip install --upgrade pip
        pip install ccxt pandas requests schedule
        # Cài Numpy bản cũ trước
        pip install "numpy<2.0.0"
        # Cài Pandas-TA bản Development từ link trực tiếp
        pip install https://github.com/twopirllc/pandas-ta/archive/development.zip

    - name: Run Trading Bot
      env:
        BINANCE_API_KEY: ${{ secrets.BINANCE_API_KEY }}
        BINANCE_SECRET_KEY: ${{ secrets.BINANCE_SECRET_KEY }}
        TELEGRAM_TOKEN: ${{ secrets.TELEGRAM_TOKEN }}
        TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
      # LƯU Ý: Đảm bảo file code của bạn tên là main.py
      # Nếu file bạn tên là bot.py thì sửa dòng dưới thành: python bot.py
      run: python main.py

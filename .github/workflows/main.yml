name: Crypto Bot SMC (H1-H4)

on:
  schedule:
    # --- QUAN TRỌNG ---
    # Chạy vào phút thứ 10 của mỗi giờ (ví dụ: 8:10, 9:10...)
    # Để đảm bảo nến 1H/4H đã đóng cửa hoàn toàn và API sàn cập nhật xong.
    - cron: '10 * * * *'
  
  workflow_dispatch: # Nút bấm chạy tay (để test ngay lập tức nếu muốn)

jobs:
  run-bot:
    runs-on: ubuntu-latest
    
    # Ngắt job nếu chạy quá 10 phút (tránh treo bot tốn quota miễn phí)
    timeout-minutes: 10

    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.10'
        cache: 'pip' # Cache lại thư viện để chạy nhanh hơn ở các lần sau

    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        # Cài đúng 4 thư viện cần thiết cho file main.py
        pip install ccxt pandas numpy requests

    - name: Run Trading Bot
      env:
        # Đảm bảo bạn đã thêm 2 biến này vào Settings > Secrets and variables > Actions
        TELEGRAM_TOKEN: ${{ secrets.TELEGRAM_TOKEN }}
        TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
      run: python main.py

name: Crypto Bot H1-H4

on:
  schedule:
    # Chạy vào phút thứ 5 của mỗi giờ (0:05, 1:05, 2:05...)
    # Logic: 
    # - H1: Chạy mỗi lần trigger
    # - H4: Python sẽ tự lọc chỉ chạy vào 0h, 4h, 8h...
    - cron: '5 * * * *'
  
  workflow_dispatch: # Nút chạy tay để test

jobs:
  run-bot:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout code
      uses: actions/checkout@v3

    - name: Set up Python
      uses: actions/setup-python@v4
      with:
        python-version: '3.10'

    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        
        # 1. Cài setuptools (Bắt buộc để build thư viện tài chính)
        pip install setuptools wheel
        
        # 2. Fix lỗi Numpy 2.0 (Quan trọng: pandas_ta chưa hỗ trợ numpy 2.0)
        pip install "numpy<2.0"
        
        # 3. Cài các thư viện chính
        pip install ccxt pandas requests pandas_ta

    - name: Run Trading Bot
      env:
        TELEGRAM_TOKEN: ${{ secrets.TELEGRAM_TOKEN }}
        TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
      run: python main.py

name: H4 Trading Bot

on:
  schedule:
    - cron: '5 0,4,8,12,16,20 * * *' # Chạy lúc 7h05, 11h05... VN
  workflow_dispatch: # Cho phép bấm nút chạy tay để test

jobs:
  run-bot:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout code
      uses: actions/checkout@v3

    - name: Set up Python
      uses: actions/setup-python@v4
      with:
        python-version: '3.10'

    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install ccxt pandas requests schedule
        
        # 1. Hạ cấp Numpy để tránh lỗi NaN
        pip install "numpy<2.0.0"
        
        # 2. Hạ cấp Setuptools để tránh lỗi pkg_resources
        pip install "setuptools<70.0.0"
        
        # 3. Cài Pandas-TA bằng Git (Cách chuẩn nhất trên Linux)
        pip install git+https://github.com/twopirllc/pandas-ta.git@development

    - name: Run Trading Bot
      env:
        BINANCE_API_KEY: ${{ secrets.BINANCE_API_KEY }}
        BINANCE_SECRET_KEY: ${{ secrets.BINANCE_SECRET_KEY }}
        TELEGRAM_TOKEN: ${{ secrets.TELEGRAM_TOKEN }}
        TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
      run: python main.py

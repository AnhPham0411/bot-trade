name: H4 Trading Bot

on:
  schedule:
    # Chạy vào phút thứ 5 của mỗi khung 4 giờ theo giờ UTC
    # Giờ VN = Giờ UTC + 7
    # 0h UTC = 7h sáng VN
    - cron: '5 0,4,8,12,16,20 * * *'
  workflow_dispatch: # Cho phép bấm nút chạy tay để test ngay lập tức

jobs:
  run-bot:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout code
      uses: actions/checkout@v3

    - name: Set up Python
      uses: actions/setup-python@v4
      with:
        python-version: '3.10'

    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        
        # --- BƯỚC 1: Cài đặt môi trường nền (BẮT BUỘC) ---
        # Phải cài Setuptools cũ trước để tránh lỗi pkg_resources
        pip install "setuptools<70.0.0"
        
        # Phải ép dùng Numpy bản 1.x để tránh lỗi NaN
        pip install "numpy<2.0.0"
        
        # --- BƯỚC 2: Cài thư viện chỉ báo ---
        # Dùng lệnh git+ để lấy bản mới nhất từ tác giả (fix lỗi tốt nhất trên Linux)
        pip install git+https://github.com/twopirllc/pandas-ta.git@development
        
        # --- BƯỚC 3: Cài các thư viện phụ trợ ---
        # Cài sau cùng để nó tự nhận diện Numpy đã có sẵn
        pip install ccxt pandas requests schedule

    - name: Run Trading Bot
      env:
        BINANCE_API_KEY: ${{ secrets.BINANCE_API_KEY }}
        BINANCE_SECRET_KEY: ${{ secrets.BINANCE_SECRET_KEY }}
        TELEGRAM_TOKEN: ${{ secrets.TELEGRAM_TOKEN }}
        TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
      # LƯU Ý QUAN TRỌNG:
      # Hãy đảm bảo file code bạn upload lên GitHub tên là main.py
      # Nếu tên là bot.py thì sửa dòng dưới thành: python bot.py
      run: python main.py

name: Crypto Bot H1-H4

on:
  schedule:
    # Chạy vào phút thứ 5 của mỗi giờ
    - cron: '5 * * * *'
  
  workflow_dispatch: # Nút chạy tay để test

jobs:
  run-bot:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout code
      uses: actions/checkout@v3

    - name: Set up Python
      uses: actions/setup-python@v4
      with:
        python-version: '3.10'

    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        
        # 1. Cài các thư viện cơ bản
        pip install ccxt pandas requests
        
        # 2. Cài thư viện pandas-ta-classic (Bản này chạy ổn định nhất)
        # Link này chứa bản fix lỗi Numpy rồi, cài là chạy ngay
        pip install git+https://github.com/xgboosted/pandas-ta-classic.git

    - name: Run Trading Bot
      env:
        TELEGRAM_TOKEN: ${{ secrets.TELEGRAM_TOKEN }}
        TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
      run: python main.py

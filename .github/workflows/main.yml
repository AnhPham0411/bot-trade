name: Crypto Dual Bot SMC (H1-H4)

on:
  schedule:
    # Chạy vào phút thứ 10 của mỗi giờ (ví dụ: 01:10, 02:10...)
    # 24 lần chạy/ngày sẽ giúp bạn sử dụng cực ít phút trong 2,000 phút miễn phí
    - cron: '10 * * * *'
  
  workflow_dispatch: # Cho phép bấm nút chạy tay để test

jobs:
  run-dual-bot:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    
    permissions:
      contents: read

    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.10'
        cache: 'pip'

    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install ccxt pandas numpy requests scikit-learn joblib

    # --- CHẠY BOT 1 (main.py) ---
    - name: Run Trading Bot 1
      env:
        TELEGRAM_TOKEN: ${{ secrets.TELEGRAM_TOKEN }}
        TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
      run: python main.py

    # --- CHẠY BOT 2 (main2.py) ---
    - name: Run Trading Bot 2
      env:
        TELEGRAM_TOKEN: ${{ secrets.TELEGRAM_TOKEN_1 }}
        TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
      run: python main2.py

    - name: Run Trading Bot 2
      env:
        TELEGRAM_TOKEN: ${{ secrets.TELEGRAM_TOKEN_1 }}
        TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
      run: python main3.py

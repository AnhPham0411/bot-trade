name: Crypto Dual Bot SMC (H1-H4)

on:
  schedule:
    # Chạy mỗi 20 phút để bắt kịp nến 15m, 1h và 4h
    - cron: '*/20 * * * *'
  
  workflow_dispatch: # Cho phép chạy tay để test

jobs:
  run-dual-bot:
    runs-on: ubuntu-latest
    
    # Giới hạn 10 phút để tránh treo runner
    timeout-minutes: 10
    
    permissions:
      contents: read

    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.10'
        cache: 'pip'

    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install ccxt pandas numpy requests scikit-learn joblib

    # --- CHẠY BOT 1 (Sử dụng Token 1) ---
    - name: Run Trading Bot 1
      env:
        TELEGRAM_TOKEN: ${{ secrets.TELEGRAM_TOKEN_1 }}
        TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
      run: python main.py

    # --- CHẠY BOT 2 (Sử dụng Token 2) ---
    - name: Run Trading Bot 2
      env:
        TELEGRAM_TOKEN: ${{ secrets.TELEGRAM_TOKEN_2 }}
        TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
      run: python main2.py

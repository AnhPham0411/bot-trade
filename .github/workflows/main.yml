name: Crypto Bot SMC (H1-H4)

on:
  schedule:
    # --- QUAN TRỌNG ---
    # Chạy vào phút thứ 10 của mỗi giờ (ví dụ: 00:10, 01:10...) UTC
    # Lý do: Để nến H1/H4 đóng cửa hoàn toàn (tại phút 00) và sàn cập nhật data xong.
    - cron: '10 * * * *'
  
  workflow_dispatch: # Cho phép bấm nút "Run workflow" để test tay

jobs:
  run-bot:
    runs-on: ubuntu-latest
    
    # Giới hạn chạy tối đa 10 phút để tiết kiệm tài nguyên
    timeout-minutes: 10
    
    # Quyền đọc code (Best practice)
    permissions:
      contents: read

    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.10'
        cache: 'pip' # Cache lại thư viện giúp bot chạy nhanh hơn từ lần 2

    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        # Cài đặt chính xác 4 thư viện mà file main.py yêu cầu
        pip install ccxt pandas numpy requests

    - name: Run Trading Bot
      env:
        # Bot sẽ lấy 2 biến bí mật này từ Settings > Secrets
        TELEGRAM_TOKEN: ${{ secrets.TELEGRAM_TOKEN }}
        TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
      run: python main.py

name: H4 Trading Bot

on:
  schedule:
    # Chạy lúc 7h05, 11h05, 15h05... (Giờ VN)
    - cron: '5 0,4,8,12,16,20 * * *'
  workflow_dispatch: # Cho phép bấm chạy tay để test

jobs:
  run-bot:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout code
      uses: actions/checkout@v3

    - name: Set up Python
      uses: actions/setup-python@v4
      with:
        python-version: '3.10'

    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        
        # 1. Cài các thư viện cơ bản
        pip install ccxt pandas requests schedule
        
        # 2. Cài thư viện mà bạn đã test thành công (Pandas TA Classic)
        # Bản này hỗ trợ Numpy 2.0 nên KHÔNG CẦN hạ cấp Numpy nữa
        pip install git+https://github.com/xgboosted/pandas-ta-classic.git

    - name: Run Trading Bot
      env:
        BINANCE_API_KEY: ${{ secrets.BINANCE_API_KEY }}
        BINANCE_SECRET_KEY: ${{ secrets.BINANCE_SECRET_KEY }}
        TELEGRAM_TOKEN: ${{ secrets.TELEGRAM_TOKEN }}
        TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
      run: python main.py

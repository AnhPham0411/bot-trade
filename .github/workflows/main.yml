name: Crypto Bot H1-H4

on:
  schedule:
    # --- QUAN TRỌNG ---
    # Chạy vào phút thứ 5 của TẤT CẢ các giờ (0h05, 1h05, 2h05...)
    # Để bot bắt được nến H1 mỗi tiếng.
    # Code Python sẽ tự động biết giờ nào cần chạy thêm H4.
    - cron: '5 * * * *'
    
  workflow_dispatch: # Cho phép bấm nút chạy tay để test

jobs:
  run-bot:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout code
      uses: actions/checkout@v3

    - name: Set up Python
      uses: actions/setup-python@v4
      with:
        python-version: '3.10'

    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        
        # 1. Cài các thư viện cơ bản (Bỏ 'schedule')
        pip install ccxt pandas requests
        
        # 2. Cài thư viện pandas-ta-classic (Fix lỗi Numpy 2.0)
        pip install git+https://github.com/xgboosted/pandas-ta-classic.git

    - name: Run Trading Bot
      env:
        # Chỉ cần Token Telegram, không cần API Key sàn vì lấy giá Public
        TELEGRAM_TOKEN: ${{ secrets.TELEGRAM_TOKEN }}
        TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
      run: python main.py
